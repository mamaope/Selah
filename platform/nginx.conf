# Selah — nginx
#
# Static, unprivileged (uid 101), port 8080, read-only filesystem.
# Built for Ugandan bandwidth: gzip everything, and NEVER serve a stale number.
#
# This is a `server` block only — it is dropped into /etc/nginx/conf.d/.
# The base image (nginxinc/nginx-unprivileged) owns the main nginx.conf: it has
# NO `user` directive and it puts the pid in /tmp, both of which are required to
# run as a non-root user on a read-only root filesystem.
#
# ══════════════════════════════════════════════════════════════════════════════
# 🔴 THIS FILE ONCE SHIPPED TRUNCATED, MID-DIRECTIVE, AND NGINX CRASH-LOOPED.
#
# It was cut off at `location ~* \.(` — the caching block, the routing and the
# closing braces simply were not there. Every stage of the build passed. 242
# engine tests passed. 93 UI tests passed. The image built. And the container
# died on boot, every time, with:
#
#     [emerg] unexpected end of file, expecting ";" or "}" in default.conf:56
#
# BECAUSE NOTHING IN THE PIPELINE HAD EVER ASKED NGINX WHETHER ITS OWN CONFIG
# WAS VALID. We verified the tax law to four decimal places and never once
# checked that the web server could start.
#
# `RUN nginx -t` now runs INSIDE the image build. A config that will not parse
# can no longer be built, let alone shipped.
# ══════════════════════════════════════════════════════════════════════════════

server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── security ──────────────────────────────────────────────────────────────
    # We will hold tax data. Start as we mean to go on.
    add_header X-Content-Type-Options     "nosniff"                         always;
    add_header X-Frame-Options            "DENY"                            always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin"                     always;

    # 🔴 script-src 'self' — NO 'unsafe-inline'.
    #
    # This forbids every inline <script> and every onclick= attribute, and it is
    # RIGHT to. It once silently killed every button on the site, and the fix was
    # to remove the inline JavaScript (see web/assets/theme.js) — NOT to weaken
    # this line. build.js now refuses to build if anybody weakens it.
    #
    # Google Fonts is the only external origin. Nothing else may talk out.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    server_tokens off;

    # ── bandwidth ─────────────────────────────────────────────────────────────
    # Uganda. Assume a slow connection and a cheap phone.
    gzip              on;
    gzip_vary         on;
    gzip_min_length   256;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/javascript application/json image/svg+xml;

    # ── liveness ──────────────────────────────────────────────────────────────
    # Declared first so it can never be shadowed by a file of the same name.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # ══ CACHING ═══════════════════════════════════════════════════════════════
    #
    # 🔴 NOTHING THAT CARRIES A TAX RULE MAY BE CACHED WITHOUT REVALIDATION.
    #
    # The obvious move is `expires 1y; immutable` on the JS bundle. DO NOT.
    # `engine.bundle.js` has NO CONTENT HASH in its name — so an aggressively
    # cached copy would keep serving the OLD PAYE BANDS to a returning user for a
    # year after we had corrected them.
    #
    # That is not a performance regression. IT IS THE EXACT FAILURE THIS COMPANY
    # EXISTS TO PREVENT. URA's own website is doing it right now, and we built a
    # product to say so. Doing it ourselves, to save a few kilobytes, would be
    # unforgivable.
    #
    # `no-cache` does NOT mean "do not store". It means "store it, but REVALIDATE
    # before you use it". The browser sends If-None-Match; nginx answers 304; the
    # bytes are not re-downloaded. The cost is one round trip. The benefit is that
    # a corrected tax band reaches every user the moment we ship it.
    #
    # When the filenames carry a content hash (engine.bundle.<hash>.js), THEN
    # these may become immutable — because a new number will have a new name.

    # The HTML. Never stale.
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # The engine, the renderers, the styles. Revalidated, never assumed.
    location ~* \.(js|css)$ {
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # Photographs and fonts carry no tax rule. Cache them hard.
    location ~* \.(jpg|jpeg|png|webp|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        access_log off;
    }

    # ── routing ───────────────────────────────────────────────────────────────
    # Four real pages. `/calculators` resolves to calculators.html.
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Never serve a dotfile. Not .git, not .env, not an editor's leftovers.
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
